<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChatGPT验证码</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f7fa;
        color: #1f2937;
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 960px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }
      h1 { margin: 0 0 16px; font-size: 22px; }
      h2 { margin: 28px 0 12px; font-size: 18px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid #e5e7eb; padding: 10px; text-align: left; }
      th { background: #f9fafb; }
      .code { font-weight: 700; color: #0ea5e9; }
      .muted { color: #6b7280; }
      .status { font-weight: 600; }
      .small-btn {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
        padding: 6px 10px;
        cursor: pointer;
      }
      .small-btn:hover { background: #f8fafc; }
      .codex-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }
      .codex-message { min-height: 20px; margin-bottom: 8px; }
      .pill {
        display: inline-block;
        border-radius: 999px;
        background: #eef2ff;
        color: #3730a3;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 700;
      }
      .error-text { color: #b91c1c; }
      .history-panel {
        margin-top: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #f9fafb;
        padding: 10px;
      }
      .history-item {
        margin-bottom: 8px;
        border-bottom: 1px dashed #e5e7eb;
        padding-bottom: 6px;
      }
      .history-item:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
      .history-code {
        display: inline-block;
        margin-left: 4px;
        padding: 2px 6px;
        border-radius: 6px;
        background: #fef08a;
        color: #b45309;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .history-time {
        margin-left: 4px;
        padding: 2px 6px;
        border-radius: 6px;
        background: #dcfce7;
        color: #166534;
        font-weight: 700;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      pre {
        margin: 0;
        background: #f3f4f6;
        border-radius: 8px;
        padding: 8px;
        overflow: auto;
      }
      @media (max-width: 680px) {
        table, th, td { font-size: 14px; }
        .codex-controls { flex-wrap: wrap; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ChatGPT验证码</h1>
      <table>
        <thead>
          <tr>
            <th>邮箱</th>
            <th>最新验证码</th>
            <th>主题</th>
            <th>更新时间</th>
            <th>状态</th>
            <th>历史记录</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="6" class="muted">加载中...</td></tr>
        </tbody>
      </table>

      <div id="history-panel" class="history-panel" hidden></div>

      <h2>Codex账号信息</h2>
      <div class="codex-controls">
        <button class="small-btn" onclick="importCodexAccount()">导入</button>
        <button class="small-btn" onclick="refreshCodexAuth()">刷新</button>
      </div>
      <div id="codex-message" class="codex-message muted"></div>
      <table>
        <thead>
          <tr>
            <th>账号</th>
            <th>订阅</th>
            <th>短周期</th>
            <th>长周期</th>
            <th>Token</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="codex-rows">
          <tr><td colspan="6" class="muted">加载中...</td></tr>
        </tbody>
      </table>
    </div>

    <script>
      const historyPanel = document.getElementById('history-panel');
      const codexRows = document.getElementById('codex-rows');
      const codexMessage = document.getElementById('codex-message');
      const HISTORY_REFRESH_MS = 3000;
      let historyTimer = null;
      let currentHistoryName = '';
      let currentHistoryEmail = '';

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text || '';
        return div.innerHTML;
      }

      function formatDateTime(value) {
        if (!value) {
          return '-';
        }

        const d = new Date(value);
        if (Number.isNaN(d.getTime())) {
          return escapeHtml(value);
        }

        const pad = (n) => String(n).padStart(2, '0');
        const y = d.getFullYear();
        const m = pad(d.getMonth() + 1);
        const da = pad(d.getDate());
        const h = pad(d.getHours());
        const mi = pad(d.getMinutes());
        const s = pad(d.getSeconds());
        return `${y}-${m}-${da} ${h}:${mi}:${s}`;
      }

      function formatTsSeconds(value) {
        if (!value) {
          return '-';
        }
        return formatDateTime(Number(value) * 1000);
      }

      function formatRemainPercent(usedPercent) {
        if (usedPercent === null || usedPercent === undefined) {
          return '-';
        }
        const used = Number(usedPercent);
        if (Number.isNaN(used)) {
          return '-';
        }
        return `${Math.max(0, 100 - used).toFixed(1)}%`;
      }

      function formatWindow(minutes) {
        if (minutes === null || minutes === undefined) {
          return '-';
        }
        const value = Number(minutes);
        if (Number.isNaN(value)) {
          return '-';
        }
        if (value >= 1440) {
          return `${Math.round(value / 1440)}天`;
        }
        if (value >= 60) {
          return `${Math.round(value / 60)}小时`;
        }
        return `${value}分钟`;
      }

      function subscriptionText(item) {
        const sub = item.subscription || {};
        const plan = sub.plan_type || sub.account_plan_type || item.chatgpt_plan_type || '-';
        const state = sub.has_subscription === true ? '有效' : sub.has_subscription === false ? '无' : '-';
        const renew = sub.renews_at ? `续：${formatTsSeconds(sub.renews_at)}` : '';
        const expire = sub.expires_at ? `到：${formatTsSeconds(sub.expires_at)}` : '';
        return `<span class="pill">${escapeHtml(plan)}</span><div class="muted">${escapeHtml(state)} ${escapeHtml(renew || expire)}</div>`;
      }

      function usageCell(usage, kind) {
        if (!usage) {
          return '-';
        }
        const used = kind === 'primary' ? usage.used_percent : usage.secondary_used_percent;
        const minutes = kind === 'primary' ? usage.window_minutes : usage.secondary_window_minutes;
        const resetsAt = kind === 'primary' ? usage.resets_at : usage.secondary_resets_at;
        return `
          <div><strong>${formatRemainPercent(used)}</strong></div>
          <div class="muted">${escapeHtml(formatWindow(minutes))}</div>
          <div class="muted">${escapeHtml(formatTsSeconds(resetsAt))}</div>
        `;
      }

      function setCodexMessage(text, isError = false) {
        codexMessage.textContent = text || '';
        codexMessage.className = `codex-message ${isError ? 'error-text' : 'muted'}`;
      }

      async function loadHistory(name, email) {
        try {
          const res = await fetch(`/api/history/${encodeURIComponent(name)}`, { cache: 'no-store' });
          const data = await res.json();
          const items = data.items || [];
          let html = `<h3>${escapeHtml(name)} 历史验证码</h3>`;
          html += `<div class="muted">邮箱：${escapeHtml(email || '-')}</div>`;
          if (!items.length) {
            html += '<p class="muted">暂无历史验证码记录。</p>';
          } else {
            for (const item of items) {
              html += '<div class="history-item">';
              html += `<div><strong>验证码：</strong><span class="history-code">${escapeHtml(item.code || '')}</span></div>`;
              html += `<div><strong>时间：</strong><span class="history-time">${escapeHtml(formatDateTime(item.created_at || ''))}</span></div>`;
              html += `<div><strong>主题：</strong>${escapeHtml(item.subject || '')}</div>`;
              html += '</div>';
            }
          }
          historyPanel.innerHTML = html;
          historyPanel.hidden = false;
        } catch (e) {
          historyPanel.innerHTML = '<p class="muted">历史记录加载失败。</p>';
          historyPanel.hidden = false;
        }
      }

      function onHistoryClick(name, email) {
        startHistoryAutoRefresh(name, email);
      }

      function startHistoryAutoRefresh(name, email) {
        if (!name) {
          return;
        }

        currentHistoryName = name;
        currentHistoryEmail = email || '';
        if (historyPanel.hidden) {
          historyPanel.hidden = false;
        }
        loadHistory(currentHistoryName, currentHistoryEmail);

        if (historyTimer) {
          clearInterval(historyTimer);
        }
        historyTimer = setInterval(() => {
          if (historyPanel.hidden) {
            return;
          }
          loadHistory(currentHistoryName, currentHistoryEmail);
        }, HISTORY_REFRESH_MS);
      }

      async function renderCodexAccounts() {
        try {
          const res = await fetch('/api/codex/accounts', { cache: 'no-store' });
          const data = await res.json();
          const items = data.items || [];
          codexRows.innerHTML = '';
          if (!items.length) {
            codexRows.innerHTML = '<tr><td colspan="6" class="muted">暂无 Codex 账号。</td></tr>';
            return;
          }

          for (const item of items) {
            const tr = document.createElement('tr');
            const tokenText = item.access_token_expires_at
              ? formatTsSeconds(item.access_token_expires_at)
              : '-';
            const status = item.error
              ? `${item.status || '异常'}：${item.error}`
              : item.status || '-';
            tr.innerHTML = `
              <td>
                <div><strong>${escapeHtml(item.label || item.id || '-')}</strong></div>
                <div class="muted">${escapeHtml(item.chatgpt_account_id || item.workspace_id || '-')}</div>
              </td>
              <td>${subscriptionText(item)}</td>
              <td>${usageCell(item.usage, 'primary')}</td>
              <td>${usageCell(item.usage, 'secondary')}</td>
              <td>
                <div>${escapeHtml(tokenText)}</div>
                <div class="muted">${item.has_refresh_token ? '可刷新' : '仅当前'}</div>
              </td>
              <td class="${item.error ? 'error-text' : 'status'}">${escapeHtml(status)}</td>
            `;
            codexRows.appendChild(tr);
          }
        } catch (e) {
          codexRows.innerHTML = '<tr><td colspan="6">Codex 账号加载失败。</td></tr>';
        }
      }

      function importCodexAccount() {
        setCodexMessage('正在打开 Codex 授权页面...');
        window.location.href = '/api/codex/auth/start?reason=import';
      }

      function refreshCodexAuth() {
        setCodexMessage('正在重新打开 Codex 授权页面...');
        window.location.href = '/api/codex/auth/start?reason=refresh';
      }

      async function render() {
        try {
          const res = await fetch('/api/codes', { cache: 'no-store' });
          const data = await res.json();
          const rows = document.getElementById('rows');
          rows.innerHTML = '';
          for (const item of data.items) {
            const tr = document.createElement('tr');
            const name = item.name || '-';
            const email = item.email || '-';
            tr.innerHTML = `
              <td>${email}</td>
              <td class="code">${item.last_code || '（暂无）'}</td>
              <td><pre>${item.subject || '-'}</pre></td>
              <td class="muted">${item.updated_at ? new Date(item.updated_at).toLocaleString() : '-'}</td>
              <td class="status">${item.status || '-'}</td>
              <td><button class="small-btn" onclick="onHistoryClick('${name}', '${email}')">查看历史</button></td>
            `;
            rows.appendChild(tr);
          }
        } catch (e) {
          const rows = document.getElementById('rows');
          rows.innerHTML = '<tr><td colspan="6">加载失败，请检查服务是否正常启动。</td></tr>';
        }
      }

      render();
      renderCodexAccounts();
      setInterval(render, 3000);
      setInterval(renderCodexAccounts, 10000);
    </script>
  </body>
</html>
