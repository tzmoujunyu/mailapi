<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChatGPT验证码</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f7fa;
        color: #1f2937;
        margin: 0;
        padding: 12px;
      }
      .container {
        width: 100%;
        max-width: none;
        min-height: calc(100vh - 24px);
        margin: 0 auto;
        background: #fff;
        border-radius: 8px;
        padding: 16px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }
      h1 { margin: 0 0 16px; font-size: 22px; }
      h2 { margin: 28px 0 12px; font-size: 18px; }
      .table-wrap {
        width: 100%;
        overflow-x: auto;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      .email-table { min-width: 980px; }
      .codex-table { min-width: 900px; }
      th, td {
        border-bottom: 1px solid #e5e7eb;
        padding: 10px;
        text-align: left;
        vertical-align: top;
        overflow-wrap: anywhere;
      }
      tbody tr:last-child td { border-bottom: 0; }
      th { background: #f9fafb; }
      .email-table th:nth-child(1) { width: 18%; }
      .email-table th:nth-child(2) { width: 10%; }
      .email-table th:nth-child(3) { width: 34%; }
      .email-table th:nth-child(4) { width: 16%; }
      .email-table th:nth-child(5) { width: 14%; }
      .email-table th:nth-child(6) { width: 8%; }
      .codex-table th:nth-child(1) { width: 28%; }
      .codex-table th:nth-child(2) { width: 18%; }
      .codex-table th:nth-child(3) { width: 18%; }
      .codex-table th:nth-child(4) { width: 18%; }
      .codex-table th:nth-child(5) { width: 18%; }
      .code { font-weight: 700; color: #0ea5e9; }
      .muted { color: #6b7280; }
      .status { font-weight: 600; }
      .status-good { color: #15803d; font-weight: 700; }
      .status-warn { color: #b45309; font-weight: 700; }
      .status-bad { color: #b91c1c; font-weight: 700; }
      .status-neutral { color: #6b7280; font-weight: 700; }
      .small-btn {
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
        padding: 6px 10px;
        cursor: pointer;
      }
      .small-btn:hover { background: #f8fafc; }
      .codex-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }
      .codex-message { min-height: 20px; margin-bottom: 8px; }
      .quota-cell {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .quota-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
      }
      .quota-title { color: #6b7280; }
      .quota-value { font-weight: 800; }
      .quota-track {
        width: 100%;
        height: 5px;
        border-radius: 999px;
        overflow: hidden;
      }
      .quota-fill {
        height: 100%;
        border-radius: inherit;
      }
      .quota-5h .quota-track { background: #bbf7d0; }
      .quota-5h .quota-fill { background: #22c55e; }
      .quota-week .quota-track { background: #bfdbfe; }
      .quota-week .quota-fill { background: #3b82f6; }
      .quota-empty .quota-fill { background: #ef4444; }
      .account-main {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .account-email {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .plan-pill {
        display: inline-block;
        flex: 0 0 auto;
        border-radius: 6px;
        padding: 2px 7px;
        font-size: 11px;
        font-weight: 700;
        line-height: 1.4;
      }
      .plan-pro { background: #fee2e2; color: #991b1b; }
      .plan-plus { background: #dbeafe; color: #1d4ed8; }
      .plan-go { background: #dcfce7; color: #166534; }
      .plan-free { background: #f3f4f6; color: #374151; }
      .plan-other { background: #fef3c7; color: #92400e; }
      .error-text { color: #b91c1c; }
      .history-panel {
        margin-top: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #f9fafb;
        padding: 10px;
      }
      .history-item {
        margin-bottom: 8px;
        border-bottom: 1px dashed #e5e7eb;
        padding-bottom: 6px;
      }
      .history-item:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
      .history-code {
        display: inline-block;
        margin-left: 4px;
        padding: 2px 6px;
        border-radius: 6px;
        background: #fef08a;
        color: #b45309;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .history-time {
        margin-left: 4px;
        padding: 2px 6px;
        border-radius: 6px;
        background: #dcfce7;
        color: #166534;
        font-weight: 700;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      pre {
        margin: 0;
        background: #f3f4f6;
        border-radius: 8px;
        padding: 8px;
        overflow: auto;
        max-height: 64px;
        white-space: pre-wrap;
      }
      @media (max-width: 680px) {
        table, th, td { font-size: 14px; }
        .codex-controls { flex-wrap: wrap; }
        body { padding: 8px; }
        .container { min-height: calc(100vh - 16px); padding: 10px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ChatGPT验证码</h1>
      <div class="table-wrap">
        <table class="email-table">
          <thead>
            <tr>
              <th>邮箱</th>
              <th>最新验证码</th>
              <th>主题</th>
              <th>更新时间</th>
              <th>状态</th>
              <th>历史记录</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="6" class="muted">加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <div id="history-panel" class="history-panel" hidden></div>

      <h2>Codex账号信息</h2>
      <div class="codex-controls">
        <button class="small-btn" onclick="importCodexAccount()">导入</button>
        <button class="small-btn" onclick="refreshCodexAuth()">刷新</button>
      </div>
      <div id="codex-message" class="codex-message muted"></div>
      <div class="table-wrap">
        <table class="codex-table">
          <thead>
            <tr>
              <th>账号</th>
              <th>5小时额度</th>
              <th>周额度</th>
              <th>Token</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody id="codex-rows">
            <tr><td colspan="5" class="muted">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      const historyPanel = document.getElementById('history-panel');
      const codeRows = document.getElementById('rows');
      const codexRows = document.getElementById('codex-rows');
      const codexMessage = document.getElementById('codex-message');
      const HISTORY_REFRESH_MS = 3000;
      let historyTimer = null;
      let currentHistoryName = '';
      let currentHistoryEmail = '';

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text || '';
        return div.innerHTML;
      }

      function escapeAttr(text) {
        return String(text || '')
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function formatDateTime(value) {
        if (!value) {
          return '-';
        }

        const d = new Date(value);
        if (Number.isNaN(d.getTime())) {
          return escapeHtml(value);
        }

        const pad = (n) => String(n).padStart(2, '0');
        const y = d.getFullYear();
        const m = pad(d.getMonth() + 1);
        const da = pad(d.getDate());
        const h = pad(d.getHours());
        const mi = pad(d.getMinutes());
        const s = pad(d.getSeconds());
        return `${y}-${m}-${da} ${h}:${mi}:${s}`;
      }

      function formatTsSeconds(value) {
        if (!value) {
          return '-';
        }
        return formatDateTime(Number(value) * 1000);
      }

      function remainPercentNumber(usedPercent) {
        if (usedPercent === null || usedPercent === undefined) {
          return null;
        }
        const used = Number(usedPercent);
        if (Number.isNaN(used)) {
          return null;
        }
        return Math.max(0, Math.min(100, Math.round(100 - used)));
      }

      function formatResetRemain(tsSeconds) {
        if (!tsSeconds) {
          return '未知';
        }
        const diff = Math.max(0, Number(tsSeconds) - Math.floor(Date.now() / 1000));
        const totalMinutes = Math.ceil(diff / 60);
        const days = Math.floor(totalMinutes / 1440);
        const hours = Math.floor((totalMinutes % 1440) / 60);
        const minutes = totalMinutes % 60;
        if (days > 0) {
          return `${days}d${hours}h${String(minutes).padStart(2, '0')}min`;
        }
        if (hours > 0) {
          return `${hours}h${String(minutes).padStart(2, '0')}min`;
        }
        return `${minutes}min`;
      }

      function planValue(item) {
        const sub = item.subscription || {};
        const plan = sub.plan_type || sub.account_plan_type || item.chatgpt_plan_type || '-';
        return String(plan || '-').toLowerCase();
      }

      function planBadge(item) {
        const plan = planValue(item);
        const label = plan && plan !== '-' ? plan.toUpperCase() : 'FREE';
        let cls = 'plan-other';
        if (plan.includes('pro')) cls = 'plan-pro';
        else if (plan.includes('plus')) cls = 'plan-plus';
        else if (plan.includes('go')) cls = 'plan-go';
        else if (plan.includes('free') || plan === '-') cls = 'plan-free';
        return `<span class="plan-pill ${cls}">${escapeHtml(label)}</span>`;
      }

      function accountTitle(item) {
        const label = String(item.label || '');
        if (item.email) return item.email;
        if (label.includes('@')) return label;
        if (item.subject) return item.subject;
        return 'Codex账号';
      }

      function accountCell(item) {
        const sub = item.subscription || {};
        const state = sub.has_subscription === true ? '有效' : sub.has_subscription === false ? '无' : '-';
        const renew = sub.renews_at ? `续：${formatTsSeconds(sub.renews_at)}` : '';
        const expire = sub.expires_at ? `到：${formatTsSeconds(sub.expires_at)}` : '';
        const detail = `${state} ${renew || expire}`.trim();
        return `
          <div class="account-main">
            <span class="account-email">${escapeHtml(accountTitle(item))}</span>
            ${planBadge(item)}
          </div>
          <div class="muted">${escapeHtml(detail || '-')}</div>
        `;
      }

      function codexStatus(item) {
        if (item.error) {
          return { text: item.status ? `${item.status}：${item.error}` : item.error, cls: 'status-bad' };
        }
        const usage = item.usage || {};
        const primaryExhausted = Number(usage.used_percent || 0) >= 99.9;
        const secondaryExhausted = Number(usage.secondary_used_percent || 0) >= 99.9;
        if (primaryExhausted || secondaryExhausted) {
          return { text: '限流', cls: 'status-bad' };
        }
        if (item.usage_status === 'available') {
          return { text: '可用', cls: 'status-good' };
        }
        if (item.usage_status === 'unavailable') {
          return { text: primaryExhausted || secondaryExhausted ? '限流' : '不可用', cls: 'status-bad' };
        }
        if (item.usage_status === 'primary_window_available_only') {
          return { text: '部分可用', cls: 'status-warn' };
        }
        if (item.status === '已刷新' || item.status === '已导入') {
          return { text: '可用', cls: 'status-good' };
        }
        return { text: item.status || '未知', cls: 'status-neutral' };
      }

      function usageCell(usage, kind) {
        if (!usage) {
          return '-';
        }
        const used = kind === 'primary' ? usage.used_percent : usage.secondary_used_percent;
        const resetsAt = kind === 'primary' ? usage.resets_at : usage.secondary_resets_at;
        const remain = remainPercentNumber(used);
        const label = kind === 'primary' ? '5小时' : '7天';
        const cls = kind === 'primary' ? 'quota-5h' : 'quota-week';
        if (remain === null) {
          return '<span class="muted">未提供</span>';
        }
        return `
          <div class="quota-cell ${cls} ${remain <= 0 ? 'quota-empty' : ''}">
            <div class="quota-head">
              <span class="quota-title">${label}</span>
              <span class="quota-value">${remain}%</span>
            </div>
            <div class="quota-track"><div class="quota-fill" style="width:${remain}%"></div></div>
            <div class="muted">${escapeHtml(formatTsSeconds(resetsAt))}</div>
            <div class="muted">${escapeHtml(formatResetRemain(resetsAt))}后刷新</div>
          </div>
        `;
      }

      function setCodexMessage(text, isError = false) {
        codexMessage.textContent = text || '';
        codexMessage.className = `codex-message ${isError ? 'error-text' : 'muted'}`;
      }

      async function loadHistory(name, email) {
        try {
          const res = await fetch(`/api/history/${encodeURIComponent(name)}`, { cache: 'no-store' });
          const data = await res.json();
          const items = data.items || [];
          let html = `<h3>${escapeHtml(name)} 历史验证码</h3>`;
          html += `<div class="muted">邮箱：${escapeHtml(email || '-')}</div>`;
          if (!items.length) {
            html += '<p class="muted">暂无历史验证码记录。</p>';
          } else {
            for (const item of items) {
              html += '<div class="history-item">';
              html += `<div><strong>验证码：</strong><span class="history-code">${escapeHtml(item.code || '')}</span></div>`;
              html += `<div><strong>时间：</strong><span class="history-time">${escapeHtml(formatDateTime(item.created_at || ''))}</span></div>`;
              html += `<div><strong>主题：</strong>${escapeHtml(item.subject || '')}</div>`;
              html += '</div>';
            }
          }
          historyPanel.innerHTML = html;
          historyPanel.hidden = false;
        } catch (e) {
          historyPanel.innerHTML = '<p class="muted">历史记录加载失败。</p>';
          historyPanel.hidden = false;
        }
      }

      function onHistoryClick(name, email) {
        startHistoryAutoRefresh(name, email);
      }

      codeRows.addEventListener('click', (event) => {
        if (!(event.target instanceof Element)) {
          return;
        }
        const button = event.target.closest('[data-history-name]');
        if (!button) {
          return;
        }
        onHistoryClick(button.dataset.historyName || '', button.dataset.historyEmail || '');
      });

      function startHistoryAutoRefresh(name, email) {
        if (!name) {
          return;
        }

        currentHistoryName = name;
        currentHistoryEmail = email || '';
        if (historyPanel.hidden) {
          historyPanel.hidden = false;
        }
        loadHistory(currentHistoryName, currentHistoryEmail);

        if (historyTimer) {
          clearInterval(historyTimer);
        }
        historyTimer = setInterval(() => {
          if (historyPanel.hidden) {
            return;
          }
          loadHistory(currentHistoryName, currentHistoryEmail);
        }, HISTORY_REFRESH_MS);
      }

      async function renderCodexAccounts() {
        try {
          const res = await fetch('/api/codex/accounts', { cache: 'no-store' });
          const data = await res.json();
          const items = data.items || [];
          codexRows.innerHTML = '';
          if (!items.length) {
            codexRows.innerHTML = '<tr><td colspan="5" class="muted">暂无 Codex 账号。</td></tr>';
            return;
          }

          for (const item of items) {
            const tr = document.createElement('tr');
            const tokenText = item.access_token_expires_at
              ? formatTsSeconds(item.access_token_expires_at)
              : '-';
            const status = codexStatus(item);
            tr.innerHTML = `
              <td>${accountCell(item)}</td>
              <td>${usageCell(item.usage, 'primary')}</td>
              <td>${usageCell(item.usage, 'secondary')}</td>
              <td>
                <div>${escapeHtml(tokenText)}</div>
                <div class="muted">${item.has_refresh_token ? '可刷新' : '仅当前'}</div>
              </td>
              <td class="${status.cls}">${escapeHtml(status.text)}</td>
            `;
            codexRows.appendChild(tr);
          }
        } catch (e) {
          codexRows.innerHTML = '<tr><td colspan="5">Codex 账号加载失败。</td></tr>';
        }
      }

      function importCodexAccount() {
        setCodexMessage('正在打开 Codex 授权页面...');
        window.location.href = '/api/codex/auth/start?reason=import';
      }

      function refreshCodexAuth() {
        setCodexMessage('正在重新打开 Codex 授权页面...');
        window.location.href = '/api/codex/auth/start?reason=refresh';
      }

      async function render() {
        try {
          const res = await fetch('/api/codes', { cache: 'no-store' });
          const data = await res.json();
          codeRows.innerHTML = '';
          for (const item of data.items) {
            const tr = document.createElement('tr');
            const name = item.name || '-';
            const email = item.email || '-';
            tr.innerHTML = `
              <td>${email}</td>
              <td class="code">${item.last_code || '（暂无）'}</td>
              <td><pre>${item.subject || '-'}</pre></td>
              <td class="muted">${item.updated_at ? new Date(item.updated_at).toLocaleString() : '-'}</td>
              <td class="status">${item.status || '-'}</td>
              <td><button class="small-btn" data-history-name="${escapeAttr(name)}" data-history-email="${escapeAttr(email)}">查看历史</button></td>
            `;
            codeRows.appendChild(tr);
          }
        } catch (e) {
          codeRows.innerHTML = '<tr><td colspan="6">加载失败，请检查服务是否正常启动。</td></tr>';
        }
      }

      render();
      renderCodexAccounts();
      setInterval(render, 3000);
      setInterval(renderCodexAccounts, 10000);
    </script>
  </body>
</html>
